<!-- LOGIN FORM CARD -->
<div class="card shadow-2-strong" style="border-radius: 1rem;">
    <div class="card-body p-5 text-center">

    <h3 class="mb-4">Sign in</h3>

    {% if errors %}
      <div class="alert alert-danger text-start">
        <ul class="mb-0">
          {% for key, error in errors.items %}
            <li>{{ error }}</li>
          {% endfor %}
        </ul>
      </div>
    {% endif %}

    <form method="POST" action="{% url 'accounts:login' %}">
      {% csrf_token %}
      <div class="mb-4 text-start">
          <input type="text" name="username" class="form-control form-control-lg" placeholder="Username" value="{{ old_data.username|default:'' }}" required />
      </div>

      <div class="mb-4 text-start">
          <input type="password" name="password" class="form-control form-control-lg" placeholder="Password" required />
      </div>

      <div class="form-check d-flex justify-content-start mb-4">
          <input class="form-check-input" type="checkbox" value="1" id="rememberMe" />
          <label class="form-check-label" for="rememberMe"> Remember me </label>
      </div>

      <hr class="my-4">
      <button class="btn btn-primary btn-lg btn-block w-100" type="submit">Login</button>
    </form>

    </div>
</div>
<!-- END LOGIN FORM -->
